name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: diary
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv pip install --system --no-cache -r pyproject.toml --group dev

      - name: mypy
        run: mypy .

      - name: flake8
        run: flake8

      - name: pytest
        run: pytest -s --color=yes --cov=application --cov=domain --cov=infrastructure --cov-config=.coverage_conf --cov-fail-under 70
