postgres:
  host: localhost
  port: 5432
  db_name: diary_benchmark
  user: postgres
  password: postgres
  pool_size: 4

llm:
  base_url: http://192.168.2.243:41234/v1
  api_key: not-needed
  model: gemma-4-26b-a4b-it
  max_tokens: 4096
  request_timeout_sec: 600
  tasks:
    parser:
      model: gemma-4-e4b-it
    agentic_qa:
      max_tokens: 4096

parser:
  context_window_hours: 12
  authors: []
  import_concurrency: 8
  timezone: Europe/Moscow

qa:
  max_tool_iterations: 5
  sql_row_cap: 200
  sql_statement_timeout_ms: 3000
  user_timezone: Europe/Moscow
  agent_max_tokens: 1024

verbose: false
